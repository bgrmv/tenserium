<div class="learn">
  <aside class="list">
    <div class="list-title">All 12 tenses</div>
    @for (group of groups(); track group.time) {
      <div class="group">
        <div class="group-label">{{ group.time }}</div>
        @for (t of group.tenses; track t.id) {
          <button
            type="button"
            class="item"
            [class.is-active]="t.active"
            [style.--c]="t.color"
            (click)="select(t.id)"
          >
            <span class="dot"></span>
            <span class="item-name">{{ t.name }}</span>
            <span class="item-key">{{ t.hotkey }}</span>
          </button>
        }
      </div>
    }
  </aside>

  <app-learn-detail
    [tenseId]="activeId()"
    [palette]="palette()"
    (trainClick)="train()"
    (reportClick)="showReport.set(true)"
  />

  @if (showReport()) {
    <app-report-error
      [questionId]="'learn:' + activeId()"
      [tenseId]="activeId()"
      (dismiss)="showReport.set(false)"
      (sent)="onReportSent()"
    />
  }

  @if (toastMsg(); as msg) {
    <div class="toast"><app-icon name="check" [size]="14" /> {{ msg }}</div>
  }
</div>
